services:
  - type: web
    name: dark-foliant-site
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_DATA_DIR
        value: /opt/render/project-data
    disk:
      name: app-data
      mountPath: /opt/render/project-data
      sizeGB: 5
